name: Tests

on:
  push:
    branches: [master, develop]
    paths:
      - "zig-toolchain.cmake"
      - "build.zig"
      - "test/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [master]
    paths:
      - "zig-toolchain.cmake"
      - "build.zig"
      - "test/**"
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Enable debug mode"
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Zig ${{ matrix.zig_version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.zig_version == 'master' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        zig_version: ["0.14.1", "0.15.2"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig_version }}

      - name: Get Zig version
        id: zig-ver
        run: echo "version=$(zig version)" >> $GITHUB_OUTPUT

      - name: Cache Zig dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/zig
            ~/AppData/Local/zig
            ~/Library/Caches/zig
          key: ${{ runner.os }}-zig-deps-${{ steps.zig-ver.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-zig-deps-

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.25"

      - name: Set up Build Tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - name: Set up Build Tools (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y ninja ccache

      - name: Set up Build Tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja ccache

      - name: System information
        run: |
          zig version
          cmake --version
          ninja --version
          ccache --version

      - name: Run tests
        run: |
          zig build test
